services:
  - type: web
    name: stakks-dashboard
    runtime: node
    rootDir: .
    buildCommand: npm --prefix server install
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: APP_TIMEZONE
        value: America/New_York
      - key: SQLITE_PATH
        value: /var/data/tracker.sqlite
      - key: BACKUP_DIR
        value: /var/data/backups
      - key: BACKUP_CHECK_INTERVAL_MINUTES
        value: "30"
      - key: MOTION_ALERT_PENDING_THRESHOLD
        value: "25"
      - key: MOTION_ALERT_FAILED_THRESHOLD
        value: "5"
      - key: AUTH_SECRET
        generateValue: true
      - key: LEVEL_EXP_BASE
        value: "1.20"
      - key: MOTION_API_KEY
        sync: false
      - key: MOTION_PROJECT_ID
        sync: false
